name: CI

on:
  push:
    branches:
      - develop
      - main
      - "feature/**"
  pull_request:
    branches:
      - develop
      - main

jobs:
  ci-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi
          pip install pytest ruff

      - name: Run lint
        run: |
          ruff check . || echo "Lint warnings found or Ruff not fully configured yet"

      - name: Run tests if present
        run: |
          if [ -d tests ]; then
            pytest -v tests
          else
            echo "No tests folder found yet"
          fi

      - name: Validate Python syntax
        run: |
          python -m compileall . || echo "Some files could not be compiled"

      - name: Validate main app import
        run: |
          python -c "import main; print('main.py loaded successfully')"

      - name: Build Docker image if Dockerfile exists
        run: |
          if [ -f Dockerfile ]; then
            docker build -t app-ci .
          else
            echo "No Dockerfile found yet"
          fi